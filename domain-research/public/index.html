<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Domain Research</title>
    <meta name="description" content="AI-assisted domain ownership research." />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="login" class="login" hidden>
      <form id="login-form" class="login-card" autocomplete="off">
        <img class="logo" src="/snagged_logo.png" alt="Snagged" />
        <h1>Domain Research</h1>
        <p class="sub">Enter the access password to continue.</p>
        <input id="password" type="password" placeholder="Password" required />
        <button type="submit">Unlock</button>
        <p id="login-error" class="login-error" hidden></p>
      </form>
    </div>

    <main class="wrap" id="app" hidden>
      <header class="head">
        <div class="brand">
          <img class="logo" src="/snagged_logo.png" alt="Snagged" />
          <h1>Domain Research</h1>
        </div>
        <p class="sub">Enter a domain. The assistant fans out to WHOIS/RDAP, DNS, Wayback and any configured premium APIs, then reasons over the results.</p>
      </header>

      <form id="search" class="search" autocomplete="off">
        <input id="domain" name="domain" type="text" placeholder="example.com" required />
        <input id="question" name="question" type="text" placeholder="Optional: a specific question (e.g. 'has this changed hands recently?')" />
        <button id="go" type="submit">Research</button>
      </form>

      <section id="status" class="status" hidden></section>

      <section id="report" class="report" hidden></section>

      <section id="evidence" class="evidence" hidden>
        <details>
          <summary>Evidence — lookups the assistant ran</summary>
          <ul id="trace"></ul>
        </details>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
